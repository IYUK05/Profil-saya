<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profil Tuan Muda IYUKO5</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #34495e; padding: 30px; border-radius: 15px; text-align: center; width: 90%; max-width: 350px; }
        .foto { width: 150px; height: 150px; border-radius: 50%; border: 3px solid white; margin-bottom: 15px; }
        .btn { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        #galeri { display: none; margin-top: 20px; }
        #galeri img { width: 100%; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Halo Dunia!</h1>
        <img src="https://i.ibb.co.com/XZJ4xJgQ/DSC-5979-124643.jpg" class="foto">
        <p>Saya <b>Tuan Muda IYUKO5</b></p>
        <button class="btn" onclick="tampilFoto()">Klik Saya</button>
        
        <div id="galeri">
            <p>Foto Kenangan Kami:</p>
            <img src="https://i.ibb.co.com/XZJ4xJgQ/DSC-5979-124643.jpg">
        </div>
    </div>

    <script>
        function tampilFoto() {
            var g = document.getElementById("galeri");
            if (g.style.display === "none") {
                g.style.display = "block";
            } else {
                g.style.display = "none";
            }
        }
    </script>
</body>
</html>
